<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Black Calculator Pro</title>
    <style>
        :root {
            --bg-body: #050508;
            --bg-calc: #0b0c10;
            --bg-display: #000000;
            --border-calc: #1f2833;
            
            --text-white: #ffffff;
            --color-yellow: #f1c40f;
            --color-orange: #e67e22;
            --color-blue: #3498db;
            --color-dark-blue: #1b4f72;
            --color-dark-green: #196f3d;
            --color-green-neon: #2ecc71;
            
            --btn-num-bg: #151b26;
            --btn-num-color: var(--text-white);
            --btn-num-border: var(--color-dark-blue);
            
            --btn-op-bg: #1c1410;
            --btn-op-color: var(--color-orange);
            --btn-op-border: #5e340e;
            
            --btn-clear-bg: #1c1b10;
            --btn-clear-color: var(--color-yellow);
            --btn-clear-border: #5e560e;
            
            --btn-eq-bg: var(--color-dark-green);
            --btn-eq-color: var(--text-white);
            --btn-eq-border: var(--color-green-neon);

            --glow-power: 0px 0px 0px transparent;
            --trans-time: 0.2s;
        }

        [data-theme="neon"] {
            --glow-power: 0px 0px 15px;
            --btn-num-bg: #0b1a30;
            --btn-num-color: #71b7ff;
            
            --btn-op-bg: #2b1605;
            --btn-op-color: #ff9d42;
            
            --btn-clear-bg: #2b2805;
            --btn-clear-color: #fff054;
            
            --btn-eq-bg: #093a1c;
            --btn-eq-color: #63ff99;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .calculator {
            background: var(--bg-calc);
            width: 100%;
            max-width: 380px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            border: 2px solid var(--border-calc);
            position: relative;
            transition: all 0.3s ease;
        }

        .calculator.error-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .logo {
            color: #45f3ff;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(69,243,255,0.3);
        }

        .theme-toggle {
            background: #151b26;
            border: 1px solid var(--border-calc);
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: #45f3ff;
            box-shadow: 0 0 12px rgba(69,243,255,0.3);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: #45f3ff;
        }

        .display-container {
            background: var(--bg-display);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 26px;
            border: 1px solid #1f2833;
            text-align: right;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            word-wrap: break-word;
            word-break: break-all;
        }

        .history {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
            min-height: 20px;
            font-weight: 400;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }

        .current-input {
            font-size: 38px;
            font-weight: 300;
            color: var(--text-white);
            line-height: 1.2;
            letter-spacing: 1px;
            transition: font-size 0.1s ease, color 0.3s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .btn {
            border: 1px solid transparent;
            outline: none;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 500;
            height: 66px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background var(--trans-time), color var(--trans-time), border var(--trans-time), box-shadow var(--trans-time), transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            background: #111;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .btn:active::after {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.92);
        }

        .btn-number {
            background: var(--btn-num-bg);
            color: var(--btn-num-color);
            border-color: var(--btn-num-border);
            box-shadow: var(--glow-power) var(--btn-num-border);
        }

        .btn-operator {
            background: var(--btn-op-bg);
            color: var(--btn-op-color);
            border-color: var(--btn-op-border);
            box-shadow: var(--glow-power) var(--btn-op-border);
        }

        .btn-bracket {
            background: #0d1726;
            color: var(--color-blue);
            border-color: #1a365d;
            box-shadow: var(--glow-power) #1a365d;
        }

        [data-theme="neon"] .btn-bracket {
            background: #0b2240;
            color: #54b2ff;
            box-shadow: var(--glow-power) #54b2ff;
        }

        .btn-clear {
            background: var(--btn-clear-bg);
            color: var(--btn-clear-color);
            border-color: var(--btn-clear-border);
            box-shadow: var(--glow-power) var(--btn-clear-border);
        }

        .btn-equal {
            background: var(--btn-eq-bg);
            color: var(--btn-eq-color);
            border-color: var(--btn-eq-border);
            grid-column: span 2;
            box-shadow: var(--glow-power) var(--btn-eq-border);
            font-weight: 600;
        }

        @media (max-width: 350px) {
            .grid { gap: 10px; }
            .btn { height: 56px; font-size: 22px; }
            .current-input { font-size: 32px; }
            .calculator { padding: 16px; }
        }

        @media (min-width: 351px) and (max-width: 420px) {
            .calculator { max-width: 340px; padding: 20px; }
            .btn { height: 60px; font-size: 23px; }
            .current-input { font-size: 34px; }
        }
    </style>
</head>
<body>

    <div class="calculator" id="calcCard">
        <div class="header-controls">
            <div class="logo">OLED PURE BLACK</div>
            <button class="theme-toggle" id="themeBtn" aria-label="Переключить неон">
                <svg id="themeIcon" viewBox="0 0 24 24">
                    <path d="M11 21h-1l1-7H7.5c-.6 0-1-.4-1-1 0-.2.1-.4.2-.5l6-9h1l-1 7h3.5c.6 0 1 .4 1 1 0 .2-.1.4-.2.5l-6 9z"/>
                </svg>
            </button>
        </div>

        <div class="display-container">
            <div class="history" id="historyView"></div>
            <div class="current-input" id="display">0</div>
        </div>

        <div class="grid">
            <button class="btn btn-clear" data-action="clear">AC</button>
            <button class="btn btn-clear" data-action="backspace">⌫</button>
            <button class="btn btn-bracket" data-val="(">(</button>
            <button class="btn btn-bracket" data-val=")">)</button>

            <button class="btn btn-number" data-val="7">7</button>
            <button class="btn btn-number" data-val="8">8</button>
            <button class="btn btn-number" data-val="9">9</button>
            <button class="btn btn-operator" data-val="/">÷</button>

            <button class="btn btn-number" data-val="4">4</button>
            <button class="btn btn-number" data-val="5">5</button>
            <button class="btn btn-number" data-val="6">6</button>
            <button class="btn btn-operator" data-val="*">×</button>

            <button class="btn btn-number" data-val="1">1</button>
            <button class="btn btn-number" data-val="2">2</button>
            <button class="btn btn-number" data-val="3">3</button>
            <button class="btn btn-operator" data-val="-">−</button>

            <button class="btn btn-number" data-val="0">0</button>
            <button class="btn btn-number" data-val=".">.</button>
            <button class="btn btn-equal" data-action="calculate">=</button>
            <button class="btn btn-operator" data-val="+">+</button>
        </div>
    </div>

    <script>
        (function() {
            const display = document.getElementById('display');
            const historyView = document.getElementById('historyView');
            const calcCard = document.getElementById('calcCard');
            const themeBtn = document.getElementById('themeBtn');
            
            let expr = '';
            let isEvaluated = false;
            let errorTimeout = null;
            let processingClick = false;

            const operators = ['+', '-', '*', '/'];
            const isOperator = char => operators.includes(char);

            // Инициализация темы из localStorage
            const savedTheme = localStorage.getItem('calculator-theme');
            if (savedTheme === 'neon') {
                document.documentElement.setAttribute('data-theme', 'neon');
            }

            // Переключение темы
            themeBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'neon') {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('calculator-theme', 'default');
                } else {
                    document.documentElement.setAttribute('data-theme', 'neon');
                    localStorage.setItem('calculator-theme', 'neon');
                }
            });

            // Безопасная привязка кликов с защитой от double-firing
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    if (processingClick) return;
                    processingClick = true;
                    
                    const val = this.getAttribute('data-val');
                    const action = this.getAttribute('data-action');

                    if (val) handleInput(val);
                    else if (action) handleAction(action);
                    
                    updateFontSize();
                    
                    setTimeout(() => { processingClick = false; }, 50);
                });
            });

            // Поддержка клавиатуры
            document.addEventListener('keydown', function(event) {
                if (document.activeElement.tagName === 'INPUT') return;

                const key = event.key;
                const keyMap = {
                    '+': '+', '-': '-', '*': '*', '/': '/',
                    'Enter': 'calculate', '=': 'calculate',
                    'Backspace': 'backspace',
                    'Escape': 'clear', 'Delete': 'clear',
                    'c': 'clear', 'C': 'clear',
                    '(': '(', ')': ')', '.': '.'
                };

                if (key >= '0' && key <= '9') {
                    handleInput(key);
                    updateFontSize();
                } else if (keyMap[key]) {
                    event.preventDefault();
                    const mapped = keyMap[key];
                    if (mapped === 'calculate' || mapped === 'backspace' || mapped === 'clear') {
                        handleAction(mapped);
                    } else {
                        handleInput(mapped);
                    }
                    updateFontSize();
                }
            });

            function handleInput(char) {
                // Сброс при новом вводе после результата
                if (isEvaluated) {
                    if (!isOperator(char) && char !== '.' && char !== ')') {
                        expr = '';
                        historyView.innerText = '';
                    }
                    isEvaluated = false;
                }

                const lastChar = expr.slice(-1);

                // Авто-вставка * перед ( если перед ним число или )
                if (char === '(' && (lastChar >= '0' && lastChar <= '9' || lastChar === ')')) {
                    expr += '*';
                }

                // Авто-вставка * после ) если вводится число или (
                if (lastChar === ')' && ((char >= '0' && char <= '9') || char === '(')) {
                    expr += '*';
                }

                // Блокировка множественных точек в одном числе
                if (char === '.') {
                    const parts = expr.split(/[\+\-\*\/\(\)]/);
                    const currentPart = parts[parts.length - 1];
                    if (currentPart.includes('.')) return;
                    if (expr === '' || isOperator(lastChar) || lastChar === '(') {
                        expr += '0';
                    }
                }

                // Защита от пустых скобок ()
                if (lastChar === '(' && char === ')') return;

                // Защита от оператора после ( кроме унарного минуса
                if (lastChar === '(' && isOperator(char) && char !== '-') return;

                // Исправленная логика замены операторов
                // Теперь унарный минус разрешён после ЛЮБОГО оператора (+, -, *, /)
                if (isOperator(char)) {
                    if (isOperator(lastChar)) {
                        const prevChar = expr.slice(-2, -1);
                        
                        if (char === '-' && (lastChar === '*' || lastChar === '/')) {
                            // Конструкции типа *- или /-
                        } else if (char === '-' && (lastChar === '+' || lastChar === '-') && !isOperator(prevChar)) {
                            // Конструкции типа +- или -- (унарный минус после сложения/вычитания)
                        } else if (lastChar === '-' && isOperator(prevChar)) {
                            // Если было *- или /- или +- и пришёл новый оператор — заменяем оба
                            expr = expr.slice(0, -2);
                        } else if (char !== '-' || !isOperator(prevChar)) {
                            // Обычная замена последнего оператора
                            expr = expr.slice(0, -1);
                        }
                    }
                }

                // Защита от ведущих нулей в начале
                if ((expr === '' || expr === '0') && char >= '0' && char <= '9') {
                    expr = '';
                }

                // Защита от ведущих нулей после операторов и скобок
                if (char >= '0' && char <= '9') {
                    const zeroRegex = /(?:[\+\-\*\/\(]|^)0$/;
                    if (zeroRegex.test(expr)) {
                        expr = expr.slice(0, -1);
                    }
                }

                expr += char;
                renderDisplay(expr);
            }

            function handleAction(action) {
                if (action === 'clear') {
                    expr = '';
                    isEvaluated = false;
                    renderDisplay('0');
                    historyView.innerText = '';
                    clearErrorState();
                } else if (action === 'backspace') {
                    if (isEvaluated) {
                        historyView.innerText = '';
                        isEvaluated = false;
                    }
                    expr = expr.slice(0, -1);
                    renderDisplay(expr || '0');
                    clearErrorState();
                } else if (action === 'calculate') {
                    if (!expr) return;
                    
                    let processedExpr = expr;
                    
                    // Шаг 1: Безопасная очистка висящих точек ДО автозакрытия скобок
                    // Заменяем висящую точку на .0 для безопасности интерпретатора
                    processedExpr = processedExpr.replace(/\.(?=[\+\-\*\/\)]|$)/g, '.0');

                    // Шаг 2: Удаляем висящие операторы на конце выражения
                    while (['+', '-', '*', '/', '.'].includes(processedExpr.slice(-1))) {
                        processedExpr = processedExpr.slice(0, -1);
                    }

                    // Шаг 3: Автозакрытие непарных скобок
                    const openBrackets = (processedExpr.match(/\(/g) || []).length;
                    const closeBrackets = (processedExpr.match(/\)/g) || []).length;
                    if (openBrackets > closeBrackets) {
                        processedExpr += ')'.repeat(openBrackets - closeBrackets);
                    }

                    try {
                        const result = new Function(`return (${processedExpr})`)();
                        if (result === Infinity || result === -Infinity || isNaN(result)) {
                            throw new Error();
                        }
                        historyView.innerText = expr.replace(/\*/g, '×').replace(/\//g, '÷') + ' =';
                        expr = String(Number(result.toFixed(8)));
                        renderDisplay(expr);
                        isEvaluated = true;
                        clearErrorState();
                    } catch (e) {
                        triggerError();
                    }
                }
            }

            function renderDisplay(text) {
                display.innerText = text.replace(/\*/g, '×').replace(/\//g, '÷');
            }

            function triggerError() {
                clearErrorState();
                calcCard.classList.add('error-shake');
                display.innerText = 'Ошибка';
                display.style.color = '#ff6b6b';
                errorTimeout = setTimeout(() => {
                    clearErrorState();
                    renderDisplay(expr || '0');
                }, 500);
            }

            function clearErrorState() {
                if (errorTimeout) {
                    clearTimeout(errorTimeout);
                    errorTimeout = null;
                }
                calcCard.classList.remove('error-shake');
                display.style.color = 'var(--text-white)';
            }

            function updateFontSize() {
                const len = display.innerText.length;
                if (len > 15) display.style.fontSize = '20px';
                else if (len > 12) display.style.fontSize = '22px';
                else if (len > 8) display.style.fontSize = '28px';
                else display.style.fontSize = '36px';
            }

            updateFontSize();
        })();
    </script>
</body>
</html>
